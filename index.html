<!DOCTYPE html>
<html lang="en">
<head>
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="input"></div>
        <div class="inner-container">
            <div class="numbers">
                <div class="row">
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                </div>

                <div class="row">
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                </div>

                <div class="row">
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                </div>

                <div class="row">
                    <button>0</button>
                    <button>.</button>
                    <button>=</button>
                </div>
            </div>

            <div class="operations">
                <button id="add">+</button>
                <button id="subtract">-</button>
                <button id="divide">÷</button>
                <button id="multiply">x</button>

            </div>
        </div>



    </div>
    
</body>
</html>
