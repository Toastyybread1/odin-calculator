<!DOCTYPE html>
<html lang="en">
<head>
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <div class="container">
        <div class="display">0</div>
        <div class="inner-container">
            <div id="numbers">
                <div class="row">
                    <!-- Added class="clear" -->
                    <button class="clear">AC</button>
                </div>
                <div class="row">
                    <!-- Grouped numbers with a class and data-value -->
                    <button class="number" data-value="0">0</button>
                    <button class="number" data-value="1">1</button>
                    <button class="number" data-value="2">2</button>
                </div>
                <div class="row">
                    <button class="number" data-value="3">3</button>
                    <button class="number" data-value="4">4</button>
                    <button class="number" data-value="5">5</button>
                </div>
                <div class="row">
                    <button class="number" data-value="6">6</button>
                    <button class="number" data-value="7">7</button>
                    <button class="number" data-value="8">8</button>
                </div>
                <div class="row">
                    <button class="number" data-value="9">9</button>
                    <button class="number" data-value=".">.</button>
                    <!-- Added class="equals" -->
                    <button class="equals">=</button>
                </div>
            </div>

            <div id="operations">
                <!-- Grouped operators with a class and data-value -->
                <button class="operator" data-value="+">+</button>
                <button class="operator" data-value="-">-</button>
                <button class="operator" data-value="/">÷</button>
                <button class="operator" data-value="*">x</button>
                <button class="operator" data-value="%">%</button>
            </div>
        </div>
    </div>
</body>
</html>
